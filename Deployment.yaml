apiVersion: apps/v1
kind: Deployment
metadata:
 name: assessment3
spec:
 replicas: 2
 selector:
 matchLabels:
 app: assessment3
 template:
 metadata:
 labels:
 app: assessment3
 spec:
 containers:
 - name: assessment3
 image: 23mis0239/assessment3:latest
 ports:
 - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
 name: html-demo-service
spec:
 type: NodePort
 selector:
 app: assessment3
 ports:
 - port: 80
 targetPort: 80
 nodePort: 30010

